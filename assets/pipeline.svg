<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" fill="none" font-family="'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif" viewBox="0 0 1200 430"><defs><linearGradient id="a" x1="0" x2="0" y1="0" y2="430" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#0a0f1f"/></linearGradient><linearGradient id="c" x1="0" x2="1200" y1="0" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#a78bfa"/><stop offset=".5" stop-color="#818cf8"/><stop offset="1" stop-color="#22d3ee"/></linearGradient><marker id="b" markerHeight="10" markerWidth="10" orient="auto" refX="7" refY="3"><path fill="#5b67d6" d="m0 0 7 3-7 3Z"/></marker></defs><rect width="1200" height="430" fill="url(#a)" rx="20"/><rect width="1198" height="428" x="1" y="1" stroke="#fff" stroke-opacity=".08" rx="19"/><text x="40" y="56" fill="#e5e7eb" font-size="26" font-weight="800">How it works — the autonomous pipeline</text><text x="40" y="84" fill="#8b95b5" font-size="15">Six n8n workflows run on schedule. No human touches the keyboard until money or legal terms appear.</text><g font-family="'Segoe UI',system-ui,sans-serif"><g transform="translate(40 130)"><rect width="176" height="150" fill="#11173a" stroke="#a78bfa" stroke-opacity=".45" rx="14"/><circle cx="28" cy="32" r="16" fill="#a78bfa" fill-opacity=".18" stroke="#a78bfa"/><text x="28" y="38" fill="#ddd6fe" font-size="16" font-weight="800" text-anchor="middle">1</text><text x="56" y="30" font-size="28">🔎</text><text x="16" y="78" fill="#e5e7eb" font-size="16" font-weight="700">Lead Collector</text><text x="16" y="102" fill="#9aa3c4" font-size="12.5">Apollo.io discovers</text><text x="16" y="120" fill="#9aa3c4" font-size="12.5">companies → Airtable</text><text x="16" y="140" fill="#6f79a0" font-size="11.5" font-style="italic">every 6h</text></g><g transform="translate(238 130)"><rect width="176" height="150" fill="#11173a" stroke="#818cf8" stroke-opacity=".45" rx="14"/><circle cx="28" cy="32" r="16" fill="#818cf8" fill-opacity=".18" stroke="#818cf8"/><text x="28" y="38" fill="#c7d2fe" font-size="16" font-weight="800" text-anchor="middle">2</text><text x="56" y="30" font-size="28">🧮</text><text x="16" y="78" fill="#e5e7eb" font-size="16" font-weight="700">AI Analyzer</text><text x="16" y="102" fill="#9aa3c4" font-size="12.5">OpenAI scores 0–100</text><text x="16" y="120" fill="#9aa3c4" font-size="12.5">Hot / Warm / Cold</text><text x="16" y="140" fill="#6f79a0" font-size="11.5" font-style="italic">every 30 min</text></g><g transform="translate(436 130)"><rect width="176" height="150" fill="#11173a" stroke="#6366f1" stroke-opacity=".45" rx="14"/><circle cx="28" cy="32" r="16" fill="#6366f1" fill-opacity=".18" stroke="#6366f1"/><text x="28" y="38" fill="#c7d2fe" font-size="16" font-weight="800" text-anchor="middle">3</text><text x="56" y="30" font-size="28">✍️</text><text x="16" y="78" fill="#e5e7eb" font-size="16" font-weight="700">Email Generator</text><text x="16" y="102" fill="#9aa3c4" font-size="12.5">Claude writes + sends</text><text x="16" y="120" fill="#9aa3c4" font-size="12.5">personalized cold mail</text><text x="16" y="140" fill="#6f79a0" font-size="11.5" font-style="italic">score ≥ threshold</text></g><g transform="translate(634 130)"><rect width="176" height="150" fill="#11173a" stroke="#2dd4bf" stroke-opacity=".45" rx="14"/><circle cx="28" cy="32" r="16" fill="#2dd4bf" fill-opacity=".18" stroke="#2dd4bf"/><text x="28" y="38" fill="#99f6e4" font-size="16" font-weight="800" text-anchor="middle">4</text><text x="56" y="30" font-size="28">🤝</text><text x="16" y="78" fill="#e5e7eb" font-size="16" font-weight="700">AI Negotiator</text><text x="16" y="102" fill="#9aa3c4" font-size="12.5">Reads replies, answers</text><text x="16" y="120" fill="#9aa3c4" font-size="12.5">like a human</text><text x="16" y="140" fill="#6f79a0" font-size="11.5" font-style="italic">inbox every 1 min</text></g><g transform="translate(832 130)"><rect width="176" height="150" fill="#11173a" stroke="#22d3ee" stroke-opacity=".45" rx="14"/><circle cx="28" cy="32" r="16" fill="#22d3ee" fill-opacity=".18" stroke="#22d3ee"/><text x="28" y="38" fill="#a5f3fc" font-size="16" font-weight="800" text-anchor="middle">5</text><text x="56" y="30" font-size="28">🔁</text><text x="16" y="78" fill="#e5e7eb" font-size="16" font-weight="700">Follow-ups</text><text x="16" y="102" fill="#9aa3c4" font-size="12.5">Gentle nudges via</text><text x="16" y="120" fill="#9aa3c4" font-size="12.5">Claude + Gmail</text><text x="16" y="140" fill="#6f79a0" font-size="11.5" font-style="italic">daily 09:00</text></g><g transform="translate(1030 130)"><rect width="130" height="150" fill="#11173a" stroke="#f59e0b" stroke-opacity=".45" rx="14"/><circle cx="28" cy="32" r="16" fill="#f59e0b" fill-opacity=".18" stroke="#f59e0b"/><text x="28" y="38" fill="#fcd34d" font-size="16" font-weight="800" text-anchor="middle">6</text><text x="56" y="30" font-size="28">📊</text><text x="16" y="78" fill="#e5e7eb" font-size="15" font-weight="700">Report</text><text x="16" y="102" fill="#9aa3c4" font-size="12.5">Funnel + AI</text><text x="16" y="120" fill="#9aa3c4" font-size="12.5">insights</text><text x="16" y="140" fill="#6f79a0" font-size="11.5" font-style="italic">Mon 08:00</text></g><g stroke="#5b67d6" stroke-width="2.5" marker-end="url(#b)"><path d="M218 205h18"/><path d="M416 205h18"/><path d="M614 205h18"/><path d="M812 205h18"/><path d="M1010 205h18"/></g></g><rect width="1120" height="68" x="40" y="320" fill="#0e1430" stroke="#fff" stroke-opacity=".06" rx="14"/><text x="64" y="350" fill="#22d3ee" font-size="14" font-weight="700">Human-in-the-loop</text><text x="64" y="372" fill="#9aa3c4" font-size="13">Anything touching money, contracts, legal terms, or an upset sender is auto-flagged, drafted, and held for your approval — never auto-sent.</text><rect width="1120" height="4" x="40" y="408" fill="url(#c)" rx="2"/></svg>