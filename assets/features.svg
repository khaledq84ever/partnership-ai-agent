<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" fill="none" font-family="'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif" viewBox="0 0 1200 430"><defs><linearGradient id="a" x1="0" x2="1200" y1="0" y2="430" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#0a0f1f"/></linearGradient></defs><rect width="1200" height="430" fill="url(#a)" rx="20"/><rect width="1198" height="428" x="1" y="1" stroke="#fff" stroke-opacity=".08" rx="19"/><text x="40" y="56" fill="#e5e7eb" font-size="26" font-weight="800">What it does for you</text><text x="40" y="84" fill="#8b95b5" font-size="15">A full BD team, automated end-to-end — running 24/7 in a single Docker container.</text><g transform="translate(40 110)"><rect width="362" height="138" fill="#11173a" stroke="#a78bfa" stroke-opacity=".35" rx="14"/><text x="24" y="52" font-size="30">🎯</text><text x="70" y="48" fill="#e5e7eb" font-size="18" font-weight="700">Smart targeting &amp; scoring</text><text x="24" y="86" fill="#9aa3c4" font-size="13.5">Pulls firmographics from Apollo, scores every</text><text x="24" y="106" fill="#9aa3c4" font-size="13.5">company 0–100 and labels Hot / Warm / Cold so</text><text x="24" y="126" fill="#9aa3c4" font-size="13.5">only real fits ever get an email.</text></g><g transform="translate(420 110)"><rect width="362" height="138" fill="#11173a" stroke="#818cf8" stroke-opacity=".35" rx="14"/><text x="24" y="52" font-size="30">🗣️</text><text x="70" y="48" fill="#e5e7eb" font-size="18" font-weight="700">Human-like negotiation</text><text x="24" y="86" fill="#9aa3c4" font-size="13.5">Claude reads each reply, understands intent and</text><text x="24" y="106" fill="#9aa3c4" font-size="13.5">tone, and answers naturally — moving the deal</text><text x="24" y="126" fill="#9aa3c4" font-size="13.5">forward without sounding like a bot.</text></g><g transform="translate(800 110)"><rect width="360" height="138" fill="#11173a" stroke="#22d3ee" stroke-opacity=".35" rx="14"/><text x="24" y="52" font-size="30">🌐</text><text x="70" y="48" fill="#e5e7eb" font-size="18" font-weight="700">Bilingual, auto-detected</text><text x="24" y="86" fill="#9aa3c4" font-size="13.5">Detects the prospect&apos;s language and replies in</text><text x="24" y="106" fill="#9aa3c4" font-size="13.5">fluent Arabic or English — same warmth, zero</text><text x="24" y="126" fill="#9aa3c4" font-size="13.5">manual switching.</text></g><g transform="translate(40 262)"><rect width="362" height="138" fill="#11173a" stroke="#2dd4bf" stroke-opacity=".35" rx="14"/><text x="24" y="52" font-size="30">🛡️</text><text x="70" y="48" fill="#e5e7eb" font-size="18" font-weight="700">Safety guardrails</text><text x="24" y="86" fill="#9aa3c4" font-size="13.5">Money, contracts, legal or upset replies are</text><text x="24" y="106" fill="#9aa3c4" font-size="13.5">auto-flagged and held for review. Rate limits +</text><text x="24" y="126" fill="#9aa3c4" font-size="13.5">opt-out handling keep you CAN-SPAM / GDPR safe.</text></g><g transform="translate(420 262)"><rect width="362" height="138" fill="#11173a" stroke="#34d399" stroke-opacity=".35" rx="14"/><text x="24" y="52" font-size="30">🗂️</text><text x="70" y="48" fill="#e5e7eb" font-size="18" font-weight="700">Built-in CRM</text><text x="24" y="86" fill="#9aa3c4" font-size="13.5">Every company, score, conversation and status</text><text x="24" y="106" fill="#9aa3c4" font-size="13.5">logged to Airtable automatically. HubSpot</text><text x="24" y="126" fill="#9aa3c4" font-size="13.5">mapping documented for an easy swap.</text></g><g transform="translate(800 262)"><rect width="360" height="138" fill="#11173a" stroke="#f59e0b" stroke-opacity=".35" rx="14"/><text x="24" y="52" font-size="30">📈</text><text x="70" y="48" fill="#e5e7eb" font-size="18" font-weight="700">Weekly AI reports</text><text x="24" y="86" fill="#9aa3c4" font-size="13.5">Every Monday: response rate, win rate, best</text><text x="24" y="106" fill="#9aa3c4" font-size="13.5">industries and concrete recommendations,</text><text x="24" y="126" fill="#9aa3c4" font-size="13.5">emailed straight to your inbox.</text></g></svg>